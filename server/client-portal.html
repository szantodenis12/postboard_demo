<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal — PostBoard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #7c3aed;
      --primary-light: #7c3aed15;
      --bg: #f8f9fb;
      --card: #ffffff;
      --border: #e5e7eb;
      --border-light: #f0f1f3;
      --text: #1a1a2e;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
      --radius: 12px;
      --radius-lg: 16px;
      --status-draft: #9ca3af;
      --status-draft-bg: #9ca3af14;
      --status-approved: #3b82f6;
      --status-approved-bg: #3b82f614;
      --status-scheduled: #8b5cf6;
      --status-scheduled-bg: #8b5cf614;
      --status-published: #10b981;
      --status-published-bg: #10b98114;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Layout ────────────────────────────── */
    .portal-header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-logo {
      height: 36px;
      width: auto;
      object-fit: contain;
      border-radius: 6px;
    }
    .header-logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
    }
    .header-client {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .header-spacer { flex: 1; }

    /* ── Tabs ──────────────────────────────── */
    .tabs-bar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .tabs-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      gap: 0;
    }
    .tab-btn {
      position: relative;
      padding: 14px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      font-family: inherit;
    }
    .tab-btn:hover { color: var(--text-secondary); }
    .tab-btn.active { color: var(--primary); }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 16px;
      right: 16px;
      height: 2px;
      background: var(--primary);
      border-radius: 2px 2px 0 0;
    }
    .tab-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      background: var(--primary-light);
      color: var(--primary);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    /* ── Tab content ──────────────────────── */
    .tab-content { display: none; }
    .tab-content.active {
      display: block;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Calendar ─────────────────────────── */
    .cal-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .cal-month-label {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      text-transform: capitalize;
    }
    .cal-nav {
      display: flex;
      gap: 8px;
    }
    .cal-nav-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .cal-nav-btn:hover { background: var(--bg); border-color: var(--text-muted); }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: var(--border-light);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .cal-day-name {
      padding: 10px 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      background: var(--card);
      text-align: center;
    }
    .cal-cell {
      min-height: 100px;
      background: var(--card);
      padding: 6px;
      vertical-align: top;
      position: relative;
    }
    .cal-cell.outside { background: #fbfbfc; }
    .cal-cell.today { background: #faf5ff; }
    .cal-date {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      padding: 2px 6px;
      margin-bottom: 4px;
    }
    .cal-cell.today .cal-date {
      color: var(--primary);
      font-weight: 700;
    }
    .cal-post {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 6px;
      border-radius: 6px;
      margin-bottom: 2px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1.3;
      overflow: hidden;
    }
    .cal-post:hover { filter: brightness(0.95); }
    .cal-post-icon { width: 12px; height: 12px; flex-shrink: 0; }
    .cal-post-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    /* ── Post detail modal ────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(2px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .modal {
      background: var(--card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 560px;
      max-height: 85vh;
      overflow-y: auto;
      animation: modalSlide 0.25s ease;
    }
    @keyframes modalSlide {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal-header {
      padding: 20px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-light);
    }
    .modal-header-left { display: flex; align-items: center; gap: 10px; }
    .modal-close {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: none;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .modal-close:hover { background: var(--bg); color: var(--text); }
    .modal-body { padding: 20px 24px 24px; }
    .modal-image {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: var(--radius);
      margin-bottom: 16px;
    }
    .modal-caption {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      margin-bottom: 16px;
    }
    .modal-hashtags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .modal-hashtag {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 6px;
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 500;
    }
    .modal-meta {
      padding: 14px 16px;
      background: var(--bg);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .modal-meta-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .modal-meta + .modal-meta { margin-top: 10px; }

    /* ── Approval list ────────────────────── */
    .approval-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .approval-title {
      font-size: 16px;
      font-weight: 700;
    }
    .approval-progress {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .progress-bar-track {
      width: 160px;
      height: 6px;
      background: var(--border-light);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--primary), #06b6d4);
      transition: width 0.5s ease;
    }
    .progress-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .approve-all-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--status-approved);
      background: var(--status-approved-bg);
      color: var(--status-approved);
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .approve-all-btn:hover { background: #3b82f620; }
    .approve-all-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Reviewer bar ─────────────────────── */
    .reviewer-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding: 14px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .reviewer-bar label {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      font-weight: 500;
    }
    .reviewer-bar input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .reviewer-bar input:focus { border-color: var(--primary); }
    .reviewer-bar input::placeholder { color: var(--text-muted); }

    /* ── Post approval card ───────────────── */
    .post-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      margin-bottom: 12px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .post-card:hover { box-shadow: var(--shadow); }
    .post-card.card-approved { border-color: var(--status-approved); background: #eff6ff; }
    .post-card.card-changes { border-color: #f59e0b; background: #fffbeb; }
    .post-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-platform { text-transform: uppercase; letter-spacing: 0.03em; }
    .badge-status { margin-left: auto; }

    .post-card-date {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .post-card-image {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: var(--radius);
      margin-bottom: 12px;
    }
    .post-card-caption {
      font-size: 14px;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
      margin-bottom: 12px;
    }
    .post-card-hashtags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }

    /* ── Action bar ───────────────────────── */
    .action-bar {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border-light);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 8px;
      border: 1px solid transparent;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-approve {
      background: #3b82f610;
      color: var(--status-approved);
      border-color: #3b82f630;
    }
    .btn-approve:hover { background: #3b82f620; }
    .btn-changes {
      background: #f59e0b10;
      color: #d97706;
      border-color: #f59e0b30;
    }
    .btn-changes:hover { background: #f59e0b20; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Comment form ─────────────────────── */
    .comment-form { margin-top: 12px; display: none; }
    .comment-form.visible { display: block; animation: fadeUp 0.2s ease; }
    .comment-form textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s;
    }
    .comment-form textarea:focus { border-color: var(--primary); }
    .comment-form textarea::placeholder { color: var(--text-muted); }
    .comment-form-actions { display: flex; gap: 8px; margin-top: 8px; }
    .btn-submit {
      background: #f59e0b15;
      color: #d97706;
      border-color: #f59e0b30;
    }
    .btn-submit:hover { background: #f59e0b25; }
    .btn-cancel {
      background: transparent;
      color: var(--text-muted);
      border-color: var(--border);
    }
    .btn-cancel:hover { background: var(--bg); }

    /* ── Feedback state ───────────────────── */
    .feedback-state {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
    }
    .feedback-state.visible { display: flex; flex-wrap: wrap; animation: fadeUp 0.25s ease; }
    .feedback-state.state-approved {
      background: #eff6ff;
      color: var(--status-approved);
      border: 1px solid #3b82f625;
    }
    .feedback-state.state-changes {
      background: #fffbeb;
      color: #d97706;
      border: 1px solid #f59e0b25;
    }
    .feedback-comment {
      width: 100%;
      margin-top: 8px;
      font-weight: 400;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .feedback-undo {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      text-decoration: underline;
    }
    .feedback-undo:hover { color: var(--text-secondary); }

    /* ── Analytics ─────────────────────────── */
    .analytics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .analytics-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }
    .analytics-value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .analytics-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      font-weight: 600;
      margin-top: 6px;
    }
    .top-posts-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--text);
    }
    .top-post-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
    }
    .top-post-rank {
      font-size: 18px;
      font-weight: 800;
      color: var(--primary);
      width: 28px;
      text-align: center;
    }
    .top-post-info { flex: 1; min-width: 0; }
    .top-post-text {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top-post-stats {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      display: flex;
      gap: 12px;
    }
    .no-analytics {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }
    .no-analytics h3 { font-size: 16px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }

    /* ── Footer ────────────────────────────── */
    .portal-footer {
      text-align: center;
      padding: 32px 24px;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border-light);
      margin-top: 40px;
    }
    .portal-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .portal-footer a:hover { text-decoration: underline; }

    /* ── Utilities ─────────────────────────── */
    .icon { display: inline-block; vertical-align: middle; }
    .loading-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }
    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state {
      text-align: center;
      padding: 80px 24px;
    }
    .error-state h2 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .error-state p { color: var(--text-muted); font-size: 14px; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 200;
      pointer-events: none;
    }
    .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Responsive ────────────────────────── */
    @media (max-width: 768px) {
      .analytics-grid { grid-template-columns: repeat(2, 1fr); }
      .cal-cell { min-height: 70px; }
      .cal-post { font-size: 9px; padding: 2px 4px; }
      .cal-date { font-size: 10px; }
      .header-inner { padding: 12px 16px; }
      .container { padding: 16px; }
      .action-bar { flex-direction: column; }
      .approval-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .tabs-inner { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .modal { max-width: 100%; margin: 0 12px; }
    }
    @media (max-width: 480px) {
      .cal-day-name { font-size: 9px; padding: 6px 2px; }
      .cal-cell { min-height: 56px; padding: 3px; }
      .cal-post-text { display: none; }
      .cal-post { justify-content: center; padding: 3px; }
      .analytics-grid { grid-template-columns: 1fr 1fr; }
      .post-card { padding: 16px; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div>Se incarca portalul...</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  (function() {
    'use strict';

    // ── Globals ──────────────────────────────
    var token = window.location.pathname.split('/portal/')[1];
    var portalData = null;
    var feedbackState = {};
    var reviewerName = '';
    var currentTab = 'calendar';
    var calendarYear = new Date().getFullYear();
    var calendarMonth = new Date().getMonth();

    var PLATFORM_COLORS = {
      facebook:  { bg: '#1877F215', color: '#1877F2', label: 'FB' },
      instagram: { bg: '#E4405F15', color: '#E4405F', label: 'IG' },
      linkedin:  { bg: '#0A66C215', color: '#0A66C2', label: 'LI' },

      heart: '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>',
      messageCircle: '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>',

    function getPlatformIcon(platform) {
      return ICONS[platform] || ICONS.facebook;
    }

    // ── Utilities ────────────────────────────
    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('ro-RO', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      });
    }

    function formatNumber(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1).replace('.0', '') + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1).replace('.0', '') + 'K';
      return String(n);
    }

    function showToast(message) {
      var t = document.getElementById('toast');
      t.textContent = message;
      t.classList.add('visible');
      setTimeout(function() { t.classList.remove('visible'); }, 2500);
    }

    // ── Data fetch ───────────────────────────
    fetch('/api/portal/' + token + '/data')
      .then(function(r) {
        if (!r.ok) throw new Error(r.status);
        return r.json();
      })
      .then(function(data) {
        portalData = data;
        // Pre-populate feedback state from existing feedback
        if (data.feedback) {
          for (var i = 0; i < data.feedback.length; i++) {
            feedbackState[data.feedback[i].postId] = {
              action: data.feedback[i].action,
              comment: data.feedback[i].comment || ''
            };
          }
        }
        // Apply white-label theming
        if (data.whiteLabel && data.whiteLabel.primaryColor) {
          document.documentElement.style.setProperty('--primary', data.whiteLabel.primaryColor);
          document.documentElement.style.setProperty('--primary-light', data.whiteLabel.primaryColor + '15');
        }
        renderPortal();
      })
      .catch(function() {
        document.getElementById('app').innerHTML =
          '<div class="error-state">' +
          '<h2>Link invalid sau expirat</h2>' +
          '<p>Acest link de portal nu mai este activ.</p>' +
          '</div>';
      });

    // ── Main render ──────────────────────────
    function renderPortal() {
      var d = portalData;
      var wl = d.whiteLabel || {};
      var client = d.client;
      var posts = client.posts.sort(function(a, b) { return a.date.localeCompare(b.date); });
      var pendingPosts = posts.filter(function(p) { return p.status === 'draft' || p.status === 'scheduled'; });
      var hasAnalytics = !!(d.analytics && d.analytics.combined);

      // Determine which month to show initially based on posts
      if (posts.length > 0) {
        var firstDate = new Date(posts[0].date);
        calendarYear = firstDate.getFullYear();
        calendarMonth = firstDate.getMonth();
      }

      var html = '';

      // ── Header
      html += '<div class="portal-header"><div class="header-inner">';
      if (wl.agencyLogo) {
        html += '<img class="header-logo" src="' + esc(wl.agencyLogo) + '" alt="' + esc(wl.agencyName || '') + '">';
      }
      html += '<span class="header-logo-text" style="color:' + esc(wl.primaryColor || 'var(--primary)') + '">' + esc(wl.agencyName || 'PostBoard') + '</span>';
      html += '<div class="header-divider"></div>';
      html += '<span class="header-client">' + esc(client.displayName) + '</span>';
      html += '<div class="header-spacer"></div>';
      html += '</div></div>';

      // ── Tabs
      html += '<div class="tabs-bar"><div class="tabs-inner">';
      html += '<button class="tab-btn active" data-tab="calendar" onclick="switchTab(\'calendar\')">' + ICONS.calendar + ' Calendar</button>';
      html += '<button class="tab-btn" data-tab="approval" onclick="switchTab(\'approval\')">' + ICONS.clipboardCheck + ' Aprobare';
      if (pendingPosts.length > 0) {
        html += ' <span class="tab-badge">' + pendingPosts.length + '</span>';
      }
      html += '</button>';
      if (hasAnalytics) {
        html += '<button class="tab-btn" data-tab="analytics" onclick="switchTab(\'analytics\')">' + ICONS.barChart + ' Analytics</button>';
      }
      html += '</div></div>';

      // ── Content container
      html += '<div class="container">';

      // ── Calendar tab
      html += '<div class="tab-content active" id="tab-calendar">';
      html += renderCalendar(posts);
      html += '</div>';

      // ── Approval tab
      html += '<div class="tab-content" id="tab-approval">';
      html += renderApproval(posts, pendingPosts);
      html += '</div>';

      // ── Analytics tab
      if (hasAnalytics) {
        html += '<div class="tab-content" id="tab-analytics">';
        html += renderAnalytics(d.analytics);
        html += '</div>';
      }

      html += '</div>';

      // ── Footer
      html += '<div class="portal-footer">';
      html += 'Powered by <a href="#">' + esc(wl.agencyName || 'PostBoard') + '</a>';
      html += '</div>';

      document.getElementById('app').innerHTML = html;

      // Apply feedback states
      for (var postId in feedbackState) {
        applyFeedbackUI(postId, feedbackState[postId].action, feedbackState[postId].comment);
      }
      updateApprovalProgress();
    }

    // ── Tab switching ────────────────────────
    window.switchTab = function(tab) {
      currentTab = tab;
      var btns = document.querySelectorAll('.tab-btn');
      for (var i = 0; i < btns.length; i++) {
        btns[i].classList.toggle('active', btns[i].getAttribute('data-tab') === tab);
      }
      var tabs = document.querySelectorAll('.tab-content');
      for (var i = 0; i < tabs.length; i++) {
        tabs[i].classList.toggle('active', tabs[i].id === 'tab-' + tab);
      }
    };

    // ── Calendar rendering ───────────────────
    function renderCalendar(posts) {
      var html = '<div class="cal-controls">';
      html += '<span class="cal-month-label" id="cal-month-label">' + getMonthLabel(calendarYear, calendarMonth) + '</span>';
      html += '<div class="cal-nav">';
      html += '<button class="cal-nav-btn" onclick="calPrev()" title="Luna anterioara">' + ICONS.chevronLeft + '</button>';
      html += '<button class="cal-nav-btn" onclick="calNext()" title="Luna urmatoare">' + ICONS.chevronRight + '</button>';
      html += '</div></div>';
      html += '<div id="cal-grid">';
      html += buildCalendarGrid(posts);
      html += '</div>';
      return html;
    }

    function getMonthLabel(year, month) {
      var d = new Date(year, month, 1);
      return d.toLocaleDateString('ro-RO', { month: 'long', year: 'numeric' });
    }

    function buildCalendarGrid(posts) {
      var year = calendarYear;
      var month = calendarMonth;
      var firstDay = new Date(year, month, 1).getDay();
      // Convert to Monday-start (0=Mon, 6=Sun)
      firstDay = (firstDay + 6) % 7;
      var daysInMonth = new Date(year, month + 1, 0).getDate();
      var today = new Date();
      var todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

      // Build posts-by-date index
      var postsByDate = {};
      for (var i = 0; i < posts.length; i++) {
        var dateKey = posts[i].date;
        if (!postsByDate[dateKey]) postsByDate[dateKey] = [];
        postsByDate[dateKey].push(posts[i]);
      }

      var html = '<div class="cal-grid">';

      // Day names
      var dayNames = ['Lun', 'Mar', 'Mie', 'Joi', 'Vin', 'Sam', 'Dum'];
      for (var i = 0; i < 7; i++) {
        html += '<div class="cal-day-name">' + dayNames[i] + '</div>';
      }

      // Previous month padding
      var prevDays = new Date(year, month, 0).getDate();
      for (var i = firstDay - 1; i >= 0; i--) {
        html += '<div class="cal-cell outside"><div class="cal-date">' + (prevDays - i) + '</div></div>';
      }

      // Current month
      for (var day = 1; day <= daysInMonth; day++) {
        var dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
        var isToday = dateStr === todayStr;
        html += '<div class="cal-cell' + (isToday ? ' today' : '') + '">';
        html += '<div class="cal-date">' + day + '</div>';

        var dayPosts = postsByDate[dateStr] || [];
        for (var j = 0; j < dayPosts.length; j++) {
          var p = dayPosts[j];
          var pc = PLATFORM_COLORS[p.platform] || PLATFORM_COLORS.facebook;
          var sm = STATUS_MAP[p.status] || STATUS_MAP.draft;
          html += '<div class="cal-post" style="background:' + pc.bg + ';color:' + pc.color + '" onclick="openPostModal(\'' + p.id + '\')" title="' + esc(p.caption ? p.caption.substring(0, 80) : '') + '">';
          html += '<span class="cal-post-icon">' + getPlatformIcon(p.platform) + '</span>';
          html += '<span class="cal-post-text">' + esc(p.caption ? p.caption.substring(0, 30) : pc.label) + '</span>';
          html += '<span style="width:6px;height:6px;border-radius:50%;background:' + sm.color + ';flex-shrink:0" title="' + sm.label + '"></span>';
          html += '</div>';
        }

        html += '</div>';
      }

      // Next month padding
      var totalCells = firstDay + daysInMonth;
      var remaining = (7 - (totalCells % 7)) % 7;
      for (var i = 1; i <= remaining; i++) {
        html += '<div class="cal-cell outside"><div class="cal-date">' + i + '</div></div>';
      }

      html += '</div>';
      return html;
    }

    window.calPrev = function() {
      calendarMonth--;
      if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
      refreshCalendar();
    };
    window.calNext = function() {
      calendarMonth++;
      if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
      refreshCalendar();
    };

    function refreshCalendar() {
      var label = document.getElementById('cal-month-label');
      var grid = document.getElementById('cal-grid');
      if (label) label.textContent = getMonthLabel(calendarYear, calendarMonth);
      if (grid) grid.innerHTML = buildCalendarGrid(portalData.client.posts.sort(function(a, b) { return a.date.localeCompare(b.date); }));
    }

    // ── Post modal ───────────────────────────
    window.openPostModal = function(postId) {
      var post = null;
      var posts = portalData.client.posts;
      for (var i = 0; i < posts.length; i++) {
        if (posts[i].id === postId) { post = posts[i]; break; }
      }
      if (!post) return;

      var pc = PLATFORM_COLORS[post.platform] || PLATFORM_COLORS.facebook;
      var sm = STATUS_MAP[post.status] || STATUS_MAP.draft;

      var html = '<div class="modal-overlay" onclick="closeModal(event)">';
      html += '<div class="modal" onclick="event.stopPropagation()">';

      // Modal header
      html += '<div class="modal-header"><div class="modal-header-left">';
      html += '<span class="badge badge-platform" style="background:' + pc.bg + ';color:' + pc.color + '">' + getPlatformIcon(post.platform) + ' ' + esc(post.platform) + '</span>';
      html += '<span class="badge badge-status" style="background:' + sm.bg + ';color:' + sm.color + '">' + sm.label + '</span>';
      html += '</div>';
      html += '<button class="modal-close" onclick="closeModal()">' + ICONS.x + '</button>';
      html += '</div>';

      // Modal body
      html += '<div class="modal-body">';
      html += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:16px">' + formatDate(post.date) + (post.time ? ' &bull; ' + esc(post.time) : '') + '</div>';

      if (post.imageUrl) {
        html += '<img class="modal-image" src="' + esc(post.imageUrl) + '" alt="Post image" loading="lazy">';
      }

      html += '<div class="modal-caption">' + esc(post.caption) + '</div>';

      if (post.hashtags && post.hashtags.length) {
        html += '<div class="modal-hashtags">';
        for (var i = 0; i < post.hashtags.length; i++) {
          html += '<span class="modal-hashtag">#' + esc(post.hashtags[i]) + '</span>';
        }
        html += '</div>';
      }

      if (post.visualDescription) {
        html += '<div class="modal-meta"><div class="modal-meta-label">Descriere vizuala</div>' + esc(post.visualDescription) + '</div>';
      }
      if (post.cta) {
        html += '<div class="modal-meta"><div class="modal-meta-label">Call to Action</div>' + esc(post.cta) + '</div>';
      }
      if (post.pillar) {
        html += '<div class="modal-meta"><div class="modal-meta-label">Pilon de continut</div>' + esc(post.pillar) + '</div>';
      }

      html += '</div></div></div>';

      var overlay = document.createElement('div');
      overlay.id = 'modal-container';
      overlay.innerHTML = html;
      document.body.appendChild(overlay);
    };

    window.closeModal = function(e) {
      if (e && e.target && !e.target.classList.contains('modal-overlay')) return;
      var container = document.getElementById('modal-container');
      if (container) container.remove();
    };

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        var container = document.getElementById('modal-container');
        if (container) container.remove();
      }
    });

    // ── Approval rendering ───────────────────
    function renderApproval(allPosts, pendingPosts) {
      var html = '';

      // Reviewer bar
      html += '<div class="reviewer-bar">';
      html += '<label>Numele tau:</label>';
      html += '<input type="text" id="reviewer-name" placeholder="Introdu numele tau (optional)" oninput="reviewerName=this.value">';
      html += '</div>';

      // Approval header with progress
      var reviewedCount = Object.keys(feedbackState).length;
      var totalCount = allPosts.length;
      var pct = totalCount > 0 ? Math.round((reviewedCount / totalCount) * 100) : 0;

      html += '<div class="approval-header">';
      html += '<div>';
      html += '<div class="approval-title">Aprobare continut</div>';
      html += '<div style="font-size:12px;color:var(--text-muted);margin-top:4px">' + allPosts.length + ' postari in total</div>';
      html += '</div>';
      html += '<div class="approval-progress">';
      html += '<div class="progress-bar-track"><div class="progress-bar-fill" id="approval-progress-fill" style="width:' + pct + '%"></div></div>';
      html += '<span class="progress-label" id="approval-progress-label">' + reviewedCount + '/' + totalCount + '</span>';
      html += '</div>';
      html += '</div>';

      // Approve All button (only for pending posts without feedback)
      var pendingWithoutFeedback = pendingPosts.filter(function(p) { return !feedbackState[p.id]; });
      if (pendingWithoutFeedback.length > 0) {
        html += '<div style="margin-bottom:20px">';
        html += '<button class="approve-all-btn" id="approve-all-btn" onclick="approveAll()">' + ICONS.check + ' Aproba tot (' + pendingWithoutFeedback.length + ')</button>';
        html += '</div>';
      }

      // Pending posts first, then rest
      var sorted = [].concat(pendingPosts);
      var otherPosts = allPosts.filter(function(p) { return p.status !== 'draft' && p.status !== 'scheduled'; });
      sorted = sorted.concat(otherPosts);

      // Deduplicate
      var seen = {};
      var dedupSorted = [];
      for (var i = 0; i < sorted.length; i++) {
        if (!seen[sorted[i].id]) {
          seen[sorted[i].id] = true;
          dedupSorted.push(sorted[i]);
        }
      }

      for (var i = 0; i < dedupSorted.length; i++) {
        html += renderPostCard(dedupSorted[i]);
      }

      return html;
    }

    function renderPostCard(post) {
      var pc = PLATFORM_COLORS[post.platform] || PLATFORM_COLORS.facebook;
      var sm = STATUS_MAP[post.status] || STATUS_MAP.draft;
      var isPending = post.status === 'draft' || post.status === 'scheduled';

      var html = '<div class="post-card" id="post-' + post.id + '">';
      html += '<div class="post-card-header">';
      html += '<span class="badge badge-platform" style="background:' + pc.bg + ';color:' + pc.color + '">' + getPlatformIcon(post.platform) + ' ' + esc(post.platform) + '</span>';
      if (post.format) html += '<span style="font-size:11px;color:var(--text-muted)">' + esc(post.format) + '</span>';
      html += '<span class="badge badge-status" id="status-badge-' + post.id + '" style="background:' + sm.bg + ';color:' + sm.color + '">' + sm.label + '</span>';
      html += '</div>';

      html += '<div class="post-card-date">' + formatDate(post.date) + (post.time ? ' &bull; ' + esc(post.time) : '') + '</div>';

      if (post.imageUrl) {
        html += '<img class="post-card-image" src="' + esc(post.imageUrl) + '" alt="Post image" loading="lazy">';
      }

      html += '<div class="post-card-caption">' + esc(post.caption) + '</div>';

      if (post.hashtags && post.hashtags.length) {
        html += '<div class="post-card-hashtags">';
        for (var j = 0; j < post.hashtags.length; j++) {
          html += '<span class="modal-hashtag">#' + esc(post.hashtags[j]) + '</span>';
        }
        html += '</div>';
      }

      if (post.visualDescription) {
        html += '<div class="modal-meta"><div class="modal-meta-label">Descriere vizuala</div>' + esc(post.visualDescription) + '</div>';
      }

      // Action bar (only for pending posts)
      if (isPending) {
        html += '<div class="action-bar" id="actions-' + post.id + '">';
        html += '<button class="btn btn-approve" onclick="submitApprove(\'' + post.id + '\')">' + ICONS.check + ' Aprob</button>';
        html += '<button class="btn btn-changes" onclick="showCommentForm(\'' + post.id + '\')">' + ICONS.edit + ' Necesita modificari</button>';
        html += '</div>';

        // Comment form
        html += '<div class="comment-form" id="comment-form-' + post.id + '">';
        html += '<textarea id="comment-text-' + post.id + '" placeholder="Descrie ce modificari sunt necesare..."></textarea>';
        html += '<div class="comment-form-actions">';
        html += '<button class="btn btn-submit" onclick="submitChanges(\'' + post.id + '\')">' + ICONS.edit + ' Trimite feedback</button>';
        html += '<button class="btn btn-cancel" onclick="hideCommentForm(\'' + post.id + '\')">Anuleaza</button>';
        html += '</div></div>';
      }

      // Feedback state (shown after submission)
      html += '<div class="feedback-state" id="feedback-' + post.id + '"></div>';

      html += '</div>';
      return html;
    }

    // ── Approval actions ─────────────────────
    window.showCommentForm = function(postId) {
      var form = document.getElementById('comment-form-' + postId);
      if (form) { form.classList.add('visible'); form.querySelector('textarea').focus(); }
    };

    window.hideCommentForm = function(postId) {
      var form = document.getElementById('comment-form-' + postId);
      if (form) form.classList.remove('visible');
    };

    window.submitApprove = function(postId) {
      sendFeedback(postId, 'approved', '');
    };

    window.submitChanges = function(postId) {
      var comment = document.getElementById('comment-text-' + postId).value.trim();
      sendFeedback(postId, 'changes-requested', comment);
    };

    function sendFeedback(postId, action, comment) {
      var actionsEl = document.getElementById('actions-' + postId);
      if (actionsEl) {
        var buttons = actionsEl.querySelectorAll('button');
        for (var i = 0; i < buttons.length; i++) buttons[i].disabled = true;
      }

      fetch('/api/review/' + token + '/posts/' + postId + '/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: action, comment: comment, reviewerName: reviewerName })
      })
      .then(function(r) { if (!r.ok) throw new Error('Failed'); return r.json(); })
      .then(function(data) {
        feedbackState[postId] = { action: action, comment: comment };
        var statusUpdated = data.statusUpdated || (action === 'approved' ? 'approved' : 'draft');
        applyFeedbackUI(postId, action, comment, statusUpdated);
        updateApprovalProgress();
        showToast(action === 'approved' ? 'Postare aprobata!' : 'Feedback trimis!');
      })
      .catch(function() {
        if (actionsEl) {
          var buttons = actionsEl.querySelectorAll('button');
          for (var i = 0; i < buttons.length; i++) buttons[i].disabled = false;
        }
        showToast('Eroare. Te rugam sa incerci din nou.');
      });
    }

    function applyFeedbackUI(postId, action, comment, statusUpdated) {
      var postEl = document.getElementById('post-' + postId);
      var actionsEl = document.getElementById('actions-' + postId);
      var commentForm = document.getElementById('comment-form-' + postId);
      var feedbackEl = document.getElementById('feedback-' + postId);

      if (!postEl) return;

      // Hide action buttons and comment form
      if (actionsEl) actionsEl.style.display = 'none';
      if (commentForm) commentForm.style.display = 'none';

      // Style the post card
      postEl.classList.remove('card-approved', 'card-changes');
      postEl.classList.add(action === 'approved' ? 'card-approved' : 'card-changes');

      // Update status badge
      var statusBadge = document.getElementById('status-badge-' + postId);
      if (statusBadge) {
        var newStatus = statusUpdated || (action === 'approved' ? 'approved' : 'draft');
        var sm = STATUS_MAP[newStatus] || STATUS_MAP.draft;
        statusBadge.style.background = sm.bg;
        statusBadge.style.color = sm.color;
        statusBadge.textContent = sm.label;
      }

      // Show feedback state
      if (feedbackEl) {
        var stateClass = action === 'approved' ? 'state-approved' : 'state-changes';
        var icon = action === 'approved' ? ICONS.checkCircle : ICONS.alert;
        var label = action === 'approved' ? 'Aprobat' : 'Modificari solicitate';

        var html = icon + ' ' + label;
        html += '<button class="feedback-undo" onclick="undoFeedback(\'' + postId + '\')">Schimba</button>';
        if (comment) {
          html += '<div class="feedback-comment">' + esc(comment) + '</div>';
        }

        feedbackEl.className = 'feedback-state visible ' + stateClass;
        feedbackEl.innerHTML = html;
      }
    }

    window.undoFeedback = function(postId) {
      var postEl = document.getElementById('post-' + postId);
      var actionsEl = document.getElementById('actions-' + postId);
      var feedbackEl = document.getElementById('feedback-' + postId);

      if (!postEl) return;

      if (actionsEl) {
        actionsEl.style.display = 'flex';
        var buttons = actionsEl.querySelectorAll('button');
        for (var i = 0; i < buttons.length; i++) buttons[i].disabled = false;
      }

      if (feedbackEl) {
        feedbackEl.className = 'feedback-state';
        feedbackEl.innerHTML = '';
      }

      postEl.classList.remove('card-approved', 'card-changes');
      delete feedbackState[postId];
      updateApprovalProgress();
    };

    window.approveAll = function() {
      var posts = portalData.client.posts;
      var pending = posts.filter(function(p) {
        return (p.status === 'draft' || p.status === 'scheduled') && !feedbackState[p.id];
      });
      if (pending.length === 0) return;

      var btn = document.getElementById('approve-all-btn');
      if (btn) btn.disabled = true;

      var promises = pending.map(function(p) {
        return fetch('/api/review/' + token + '/posts/' + p.id + '/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'approved', comment: '', reviewerName: reviewerName })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          feedbackState[p.id] = { action: 'approved', comment: '' };
          var statusUpdated = data.statusUpdated || 'approved';
          applyFeedbackUI(p.id, 'approved', '', statusUpdated);
        });
      });

      Promise.all(promises).then(function() {
        updateApprovalProgress();
        showToast('Toate postarile au fost aprobate!');
        if (btn) btn.style.display = 'none';
      }).catch(function() {
        if (btn) btn.disabled = false;
        showToast('Eroare la aprobare. Incearca din nou.');
      });
    };

    function updateApprovalProgress() {
      var reviewed = Object.keys(feedbackState).length;
      var total = portalData.client.posts.length;
      var pct = total > 0 ? Math.round((reviewed / total) * 100) : 0;

      var fill = document.getElementById('approval-progress-fill');
      var label = document.getElementById('approval-progress-label');
      if (fill) fill.style.width = pct + '%';
      if (label) label.textContent = reviewed + '/' + total;

      // Update approve all button count
      var pending = portalData.client.posts.filter(function(p) {
        return (p.status === 'draft' || p.status === 'scheduled') && !feedbackState[p.id];
      });
      var btn = document.getElementById('approve-all-btn');
      if (btn) {
        if (pending.length === 0) {
          btn.style.display = 'none';
        } else {
          btn.innerHTML = ICONS.check + ' Aproba tot (' + pending.length + ')';
        }
      }
    }

    // ── Analytics rendering ──────────────────
    function renderAnalytics(analytics) {
      if (!analytics || !analytics.combined) {
        return '<div class="no-analytics"><h3>Nu exista date analitice</h3><p>Analytics-ul va fi disponibil dupa prima sincronizare.</p></div>';
      }

      var c = analytics.combined;
      var html = '';

      // Stats grid
      html += '<div class="analytics-grid">';
      html += renderAnalyticsCard(formatNumber(c.totalPosts), 'Postari', 'var(--primary)');
      html += renderAnalyticsCard(formatNumber(c.totalLikes || 0), 'Like-uri', '#E4405F');
      html += renderAnalyticsCard(formatNumber(c.totalComments || 0), 'Comentarii', '#1877F2');
      html += renderAnalyticsCard(formatNumber(c.totalEngagement || 0), 'Engagement Total', 'var(--status-published)');
      html += '</div>';

      // Averages
      html += '<div class="analytics-grid" style="grid-template-columns: repeat(3, 1fr)">';
      html += renderAnalyticsCard(formatNumber(c.avgEngagement || 0), 'Eng. Mediu/Post', 'var(--status-scheduled)');
      html += renderAnalyticsCard(formatNumber(c.totalShares || 0), 'Distribuiri', '#0A66C2');
      if (analytics.period) {
        html += renderAnalyticsCard(analytics.period, 'Perioada', 'var(--text-secondary)');
      }
      html += '</div>';

      // Top posts
      if (c.topPosts && c.topPosts.length > 0) {
        html += '<div class="top-posts-title">Top postari</div>';
        var limit = Math.min(c.topPosts.length, 5);
        for (var i = 0; i < limit; i++) {
          var tp = c.topPosts[i];
          html += '<div class="top-post-item">';
          html += '<div class="top-post-rank">#' + (i + 1) + '</div>';
          html += '<div class="top-post-info">';
          html += '<div class="top-post-text">' + esc(tp.message || 'Fara text') + '</div>';
          html += '<div class="top-post-stats">';
          html += '<span>' + ICONS.heart + ' ' + (tp.likes || 0) + '</span>';
          html += '<span>' + ICONS.messageCircle + ' ' + (tp.comments || 0) + '</span>';
          html += '<span>' + ICONS.share + ' ' + (tp.shares || 0) + '</span>';
          html += '</div></div></div>';
        }
      }

      return html;
    }

    function renderAnalyticsCard(value, label, color) {
      return '<div class="analytics-card">' +
        '<div class="analytics-value" style="color:' + color + '">' + value + '</div>' +
        '<div class="analytics-label">' + label + '</div></div>';
    }

  })();
  </script>
</body>
</html>
