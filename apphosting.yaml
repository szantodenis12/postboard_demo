kind: AppHostingYaml
apiVersion: v1
runConfig:
  cpu: 1
  memoryMiB: 1024
  minInstances: 0
  maxInstances: 10
  concurrency: 80
scripts:
  build: npm run build
  run: npm start
environmentVariables:
  - variable: NODE_ENV
    value: production
  - variable: POSTBOARD_APP_ORIGIN
    value: https://app.epicdigitalhub.ro
  - variable: META_SCOPES
    value: pages_show_list,pages_read_engagement,pages_manage_posts,instagram_basic,instagram_content_publish,ads_management,ads_read,business_management
  - variable: DATA_DIR
    value: /workspace/storage/data
  - variable: CLIENTI_DIR
    value: /workspace/storage/CLIENTI
